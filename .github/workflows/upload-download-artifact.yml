name: Download and Use Artifact Workflow

on: 
  workflow_dispatch:

jobs:
  upload-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Create File
        run: echo "This file is created from Github Actions!" > output.txt
      - name: Upload artifact to actions
        uses: actions/checkout@v4
        with:
          name: shared-file
          path: output.txt
  use-artifact:
    runs-on: ubuntu-latest
    needs: upload-artifact
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: shared-file
      - name: Read Downloaded File
        run: cat output.txt
        
